<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Particle Countdown WebGL</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <button class="site-menu" type="button" aria-label="メニューを開く">
      <span class="site-menu__bar"></span>
      <span class="site-menu__bar"></span>
      <span class="site-menu__bar"></span>
    </button>

    <main class="main">
      <canvas id="webgl-canvas" class="main__canvas"></canvas>

      <div class="main__overlay">
        <p class="main__eyebrow">ONE MAN LIVE COUNTDOWN</p>
        <h1 class="main__title">My Live Life -STORY-</h1>
      </div>

      <div class="main__controls">
        <button id="btn-logo" class="main__control-button" type="button">
          ロゴ
        </button>
        <button id="btn-days" class="main__control-button" type="button">
          日数
        </button>
        <button id="btn-login" class="main__control-button" type="button">
          ログイン演出
        </button>
      </div>
    </main>

    <section class="album-section" aria-label="アルバム選択">
      <section class="artist__profile" aria-label="アーティスト紹介">
        <div class="artist__profile-photo-slider" aria-hidden="true">
          <div class="artist__profile-photo artist__profile-photo--1"></div>
          <div class="artist__profile-photo artist__profile-photo--2"></div>
          <div class="artist__profile-photo artist__profile-photo--3"></div>
          <div class="artist__profile-photo artist__profile-photo--4"></div>
          <div class="artist__profile-photo artist__profile-photo--5"></div>
        </div>

        <div class="artist__profile-content">
          <p class="artist__profile-eyebrow">ABOUT ARTIST</p>
          <h2 class="artist__profile-name">小原涼</h2>
          <p class="artist__profile-text">
            パワフルでまっすぐな歌声と、ライブでの熱量を武器に活動するアーティスト。
            楽曲ごとに違う表情を見せながら、聴く人の背中をそっと押すような音楽を届けている。
          </p>
          <a class="artist__profile-link" href="#" target="_blank" rel="noopener noreferrer">
            FCはこちら
          </a>
        </div>
      </section>

      <div class="album-section__body">
        <div class="album-section__carousel" aria-label="アルバム選択">
          <div class="album-section__covers" aria-hidden="true">
            <div class="album-section__cover album-section__cover--prev"></div>
            <div class="album-section__cover album-section__cover--active"></div>
            <div class="album-section__cover album-section__cover--next"></div>
          </div>
        </div>

        <div
          class="album-section__thumbnail-area"
          aria-label="アルバムサムネイル選択"
        >
          <button
            class="album-section__thumbnail-nav album-section__thumbnail-nav--prev"
            type="button"
            aria-label="前のサムネイルへ"
          >
            前へ
          </button>

          <div class="album-section__thumbnail-swiper swiper">
            <div class="album-section__thumbnail-list swiper-wrapper"></div>
          </div>

          <button
            class="album-section__thumbnail-nav album-section__thumbnail-nav--next"
            type="button"
            aria-label="次のサムネイルへ"
          >
            次へ
          </button>
        </div>

        <div class="album-section__side">
          <aside class="album-section__track-panel" aria-label="楽曲リスト">
            <h3 class="album-section__track-title">Track List</h3>
            <ol class="album-section__track-list">
              <li class="album-section__track-item">Track 01</li>
              <li class="album-section__track-item">Track 02</li>
              <li class="album-section__track-item">Track 03</li>
            </ol>
          </aside>

          <div class="album-section__actions">
            <button class="album-section__post-button" type="button">
              お気に入り楽曲をXにポストする
            </button>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module" src="./src/js/app.js"></script>
  </body>
</html>
