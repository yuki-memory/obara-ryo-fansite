<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Particle Countdown WebGL</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="main">
      <canvas id="webgl-canvas" class="main__canvas"></canvas>

      <div class="main__overlay">
        <p class="main__eyebrow">ONE MAN LIVE COUNTDOWN</p>
        <h1 class="main__title">My Live Life -STORY-</h1>
      </div>

      <div class="main__controls">
        <button id="btn-logo" class="main__control-button" type="button">
          ロゴ
        </button>
        <button id="btn-days" class="main__control-button" type="button">
          日数
        </button>
        <button id="btn-login" class="main__control-button" type="button">
          ログイン演出
        </button>
      </div>
    </main>

    <section class="album-section" aria-label="アルバム選択">
      <div class="album-section__body">
        <div class="album-section__carousel" aria-label="アルバム選択">
          <button
            class="album-section__nav-button album-section__nav-button--prev"
            type="button"
            aria-label="前のアルバム"
          >
            前へ
          </button>

          <div class="album-section__covers" aria-hidden="true">
            <div class="album-section__cover album-section__cover--prev"></div>
            <div
              class="album-section__cover album-section__cover--active"
            ></div>
            <div class="album-section__cover album-section__cover--next"></div>
          </div>

          <button
            class="album-section__nav-button album-section__nav-button--next"
            type="button"
            aria-label="次のアルバム"
          >
            次へ
          </button>
        </div>

        <div class="album-section__side">
          <aside class="album-section__track-panel" aria-label="楽曲リスト">
            <h3 class="album-section__track-title">Track List</h3>
            <ol class="album-section__track-list">
              <li class="album-section__track-item">Track 01</li>
              <li class="album-section__track-item">Track 02</li>
              <li class="album-section__track-item">Track 03</li>
            </ol>
          </aside>

          <div class="album-section__actions">
            <button class="album-section__post-button" type="button">
              お気に入り楽曲をXにポストする
            </button>
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="./src/js/app.js"></script>
  </body>
</html>
